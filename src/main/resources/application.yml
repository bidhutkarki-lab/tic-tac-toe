spring:
  application:
    name: tic-tac-toe

  # File-based H2 database (persists to ./data/tictactoe.mv.db)
  datasource:
    url: jdbc:h2:file:./data/tictactoe;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 web console at http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8082}
  servlet:
    context-path: /tic-tac-toe

# External auth microservice (registration/login)
auth:
  service:
    base-url: http://localhost:8081/auth
