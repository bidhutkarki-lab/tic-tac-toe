spring:
  application:
    name: tic-tac-toe

  # In-memory H2 database
  datasource:
    url: jdbc:h2:mem:tictactoe;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 web console at http://localhost:8080/h2-console
  h2:
    console:
      enabled: true
      path: /h2-console
